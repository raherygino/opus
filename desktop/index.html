<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data: https://api.mapbox.com; img-src 'self' data: blob: http://127.0.0.1:8080 http://192.168.1.163:8080 https://api.mapbox.com https://*.tiles.mapbox.com; connect-src 'self' http://127.0.0.1:8080 http://192.168.1.163:8080 https://nominatim.openstreetmap.org https://api.mapbox.com https://events.mapbox.com; worker-src 'self' blob:;"
    />
    <title>OPUS</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <style>
      .splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0a0b; color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
        opacity: 1; transition: opacity 0.4s ease-in-out;
      }
      .splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 200px; height: 200px; 
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .splash-logo img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
      .splash-text { margin-top: 24px; text-align: center; }
      .splash-text h1 { font-size: 20px; font-weight: 600; margin: 0; }
      .splash-text p { font-size: 12px; color: #a1a1aa; margin: 4px 0 0; }
      @keyframes splash-progress { from { width: 0; } to { width: 160px; } }
      .splash-bar {
        margin-top: 24px; width: 160px; height: 4px;
        border-radius: 999px; background: #27272a; overflow: hidden;
        animation: splash-progress 1.2s ease-in-out;
      }
      .splash-bar-inner {
        height: 100%; border-radius: 999px;
        background: #3b82f6; animation: splash-bar-shimmer 1.2s ease-in-out;
      }
      @keyframes splash-bar-shimmer {
        0% { width: 0; } 50% { width: 60%; } 100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash" id="splash">
        <div class="splash-logo">
          <img src="/src/assets/img/logo-opus.png" alt="OPUS" />
        </div>
        <div class="splash-text">
          <h1>OPUS</h1>
          <p>Chargement de votre espace de travail...</p>
        </div>
        <div class="splash-bar">
          <div class="splash-bar-inner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
